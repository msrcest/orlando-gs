<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orlando Garage Store - POS & Inventory</title>
  
  <!-- Polyfill untuk Safari/iPad OS lama agar mengenali importmap -->
  <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
  
  <!-- Menggunakan Tailwind versi 3.3.0 yang kompatibel dengan WebKit/Safari lama -->
  <script src="https://cdn.tailwindcss.com/3.3.0"></script>
  
  <!-- Babel Standalone untuk membaca JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Fallback CSS agar gambar tidak raksasa jika CDN gagal/lambat dimuat -->
  <style>
    img, video { max-width: 100%; height: auto; }
    svg { max-width: 100%; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>

  <!-- Import Maps -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Package, Search, Plus, Edit2, Trash2, X, AlertCircle, DollarSign, Layers, ArrowDownCircle, ArrowUpCircle, BarChart2, TrendingUp, History, List, Filter, Printer, Download, ShoppingCart, Minus, Receipt, Lock, User, LogOut, Loader2, Image as ImageIcon, Info, Tag, ChevronLeft, ChevronRight, Calendar, SearchCode } from 'lucide-react';

    // =========================================================================
    // PENTING: MASUKKAN URL WEB APP GOOGLE APPS SCRIPT ANDA DI BAWAH INI !!!
    // =========================================================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzEQJ00rfoWu8XnRCTgj1DFwzOtxJWU50iBumUUV9M6dPKhmhWsg9hgyytj-q1ljlgx7w/exec'; 

    function App() {
      // Data Master saking Spreadsheet
      const [usersList, setUsersList] = useState([]);
      const [items, setItems] = useState([]);
      const [transactions, setTransactions] = useState([]);
      
      // State Aplikasi & Loading
      const [initialLoading, setInitialLoading] = useState(true);
      const [isSaving, setIsSaving] = useState(false); 
      const [toast, setToast] = useState(null); 
      
      // Auth Internal
      const [isLoggedIn, setIsLoggedIn] = useState(() => sessionStorage.getItem('orlando_auth') === 'true');
      const [loginUsername, setLoginUsername] = useState('');
      const [loginPassword, setLoginPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [activeUser, setActiveUser] = useState(() => sessionStorage.getItem('orlando_user') || '');

      // Nav & Filter
      const [activeTab, setActiveTab] = useState('pos');
      const [searchTerm, setSearchTerm] = useState('');
      const [invFilter, setInvFilter] = useState({ kategori: 'Semua', ukuran: 'Semua', sort: 'default' });
      // Filter Transaksi
      const [trxFilter, setTrxFilter] = useState({ type: 'Semua', startDate: '', endDate: '', searchId: '' });
      
      // Paginasi Riwayat Transaksi
      const [currentPage, setCurrentPage] = useState(1);
      const ITEMS_PER_PAGE = 50;

      // Kasir & Customer
      const [cart, setCart] = useState([]);
      const [amountPaid, setAmountPaid] = useState('');
      const [customerName, setCustomerName] = useState('');
      const [customerPhone, setCustomerPhone] = useState('');
      
      // Print & Modal
      const [printMode, setPrintMode] = useState(null);
      const [receiptData, setReceiptData] = useState(null);
      const [isFormModalOpen, setIsFormModalOpen] = useState(false);
      const [formMode, setFormMode] = useState('add');
      const [formData, setFormData] = useState({ id: '', nama: '', kategori: 'Kaos', ukuran: 'L', hargaModal: '', hargaJual: '', stok: '', deskripsi: '', foto: '' });
      const [isTrxModalOpen, setIsTrxModalOpen] = useState(false);
      const [trxData, setTrxData] = useState({ itemId: '', nama: '', type: 'in', qty: 1, price: 0 });
      const [itemToDelete, setItemToDelete] = useState(null);
      const [detailItem, setDetailItem] = useState(null);

      const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);

      const showToast = (message, type = 'error') => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 4000);
      };

      // --- MUNDHUT DATA SAKING GOOGLE SHEETS ---
      const fetchData = async () => {
        setInitialLoading(true);
        if (APPS_SCRIPT_URL.includes('AKfycbxxxxxxxxx')) {
          setLoginError("Peringatan: URL Apps Script dereng dipungantos. Mangga dipungantos APPS_SCRIPT_URL ing lebet kode ngagem URL valid panjenengan.");
          setInitialLoading(false);
          return;
        }

        try {
          const res = await fetch(APPS_SCRIPT_URL + '?action=getData');
          const data = await res.json();
          setUsersList(data.users || []);
          setItems(data.inventory || []);
          const sortedTrx = (data.transactions || []).sort((a, b) => new Date(b.date) - new Date(a.date));
          setTransactions(sortedTrx);
        } catch (error) {
          console.error("Gagal mundhut data:", error);
          setLoginError("Gagal kasambung menyang Spreadsheet. Priksa manawa URL Web App leres lan nggadhahi idin 'Sinten Kemawon'.");
        }
        setInitialLoading(false);
      };

      useEffect(() => {
        fetchData();
      }, []);

      // --- FUNGSI POST MENYANG GOOGLE SHEETS ---
      const sendDataToSheet = async (payload) => {
        setIsSaving(true);
        try {
          await fetch(APPS_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
          });
          await fetchData(); 
        } catch (error) {
          console.error("Error nyimpen data:", error);
          showToast("Gagal nyimpen data menyang Spreadsheet!", "error");
        }
        setIsSaving(false);
      };

      // --- FUNGSI LOGIN ---
      const handleAppLogin = (e) => {
        e.preventDefault();
        const inputUser = loginUsername.trim();
        const foundUser = usersList.find(u => String(u.username).toLowerCase() === inputUser.toLowerCase() && String(u.pass) === loginPassword);
        if (foundUser) {
          setIsLoggedIn(true); setActiveUser(foundUser.Nama); setLoginError('');
          sessionStorage.setItem('orlando_auth', 'true'); sessionStorage.setItem('orlando_user', foundUser.Nama);
        } else {
          setLoginError('Username utawi password klentu!');
        }
      };

      const handleAppLogout = () => {
        setIsLoggedIn(false); setActiveUser(''); setLoginUsername(''); setLoginPassword('');
        sessionStorage.removeItem('orlando_auth'); sessionStorage.removeItem('orlando_user');
      };

      // --- CRUD INVENTORI ---
      const handleSaveItem = async (e) => {
        e.preventDefault();
        const payload = {
          id: formMode === 'add' ? generateId() : formData.id,
          nama: formData.nama, kategori: formData.kategori, ukuran: formData.ukuran,
          hargaModal: Number(formData.hargaModal), hargaJual: Number(formData.hargaJual), stok: Number(formData.stok),
          deskripsi: formData.deskripsi || '', foto: formData.foto || '', updatedAt: new Date().toISOString()
        };
        await sendDataToSheet({ action: 'saveItem', payload: payload });
        setIsFormModalOpen(false);
      };

      const handleDeleteItem = async () => {
        if (!itemToDelete) return;
        await sendDataToSheet({ action: 'deleteItem', id: itemToDelete.id });
        setItemToDelete(null);
      };

      const handleSaveTransaction = async (e) => {
        e.preventDefault();
        const item = items.find(i => i.id === trxData.itemId);
        if (!item) return;
        const qty = Number(trxData.qty);
        if (trxData.type === 'out' && Number(item.stok) < qty) { showToast("Stok boten nyekapi!"); return; }

        const isOut = trxData.type === 'out';
        const actualPrice = isOut ? Number(trxData.price) : 0;
        const costPrice = Number(item.hargaModal) || 0;
        const now = new Date().toISOString();
        const receiptId = 'TRX' + Date.now().toString().slice(-6); 

        const trxPayload = {
          id: receiptId, itemId: item.id, itemName: `${item.nama} (${item.ukuran})`, type: trxData.type, quantity: qty,
          costPrice: costPrice, price: actualPrice, totalValue: isOut ? (actualPrice * qty) : 0, profit: isOut ? ((actualPrice - costPrice) * qty) : 0, 
          date: now, cashier: activeUser, customerName: '', customerPhone: ''
        };
        const newStok = trxData.type === 'in' ? (Number(item.stok) + qty) : (Number(item.stok) - qty);
        await sendDataToSheet({ action: 'saveTransaction', transaction: trxPayload, inventoryUpdate: { id: item.id, newStok: newStok }});
        setIsTrxModalOpen(false);
      };

      // --- FUNGSI KASIR (CHECKOUT) ---
      const addToCart = (item) => {
        if (Number(item.stok) <= 0) return;
        setCart(prev => {
          const existing = prev.find(i => i.id === item.id);
          if (existing) {
            if (existing.qty >= Number(item.stok)) return prev;
            return prev.map(i => i.id === item.id ? { ...i, qty: i.qty + 1 } : i);
          }
          return [...prev, { ...item, qty: 1, discount: 0 }];
        });
      };

      const updateCartQty = (itemId, delta) => { setCart(prev => prev.map(i => { if (i.id === itemId) { const newQty = i.qty + delta; if (newQty > Number(i.stok) || newQty < 1) return i; return { ...i, qty: newQty }; } return i; })); };
      const updateCartDiscount = (itemId, value) => { let val = Number(value); if (val < 0) val = 0; if (val > 100) val = 100; setCart(prev => prev.map(i => i.id === itemId ? { ...i, discount: val } : i)); };
      const removeFromCart = (itemId) => setCart(prev => prev.filter(i => i.id !== itemId));
      const cartTotal = cart.reduce((sum, i) => { const discMultiplier = 1 - (i.discount || 0) / 100; return sum + ((Number(i.hargaJual) || 0) * discMultiplier * i.qty); }, 0);
      
      const handleCheckout = async () => {
        if (cart.length === 0) return;
        const paid = Number(amountPaid);
        if (paid < cartTotal) { showToast("Yatra tunai boten nyekapi saking total tagihan!"); return; }

        const now = new Date().toISOString();
        const trxs = [];
        const invUpdates = [];
        const receiptId = 'TRX' + Date.now().toString().slice(-6); 

        cart.forEach(item => {
          const discMultiplier = 1 - (item.discount || 0) / 100;
          const actualPrice = (Number(item.hargaJual) || 0) * discMultiplier;
          const costPrice = Number(item.hargaModal) || 0;
          
          trxs.push({
            id: receiptId, 
            itemId: item.id, itemName: `${item.nama} (${item.ukuran})`, type: 'out', quantity: item.qty,
            costPrice: costPrice, price: actualPrice, totalValue: actualPrice * item.qty, profit: (actualPrice - costPrice) * item.qty,
            date: now, cashier: activeUser, customerName: customerName, customerPhone: customerPhone
          });
          invUpdates.push({ id: item.id, newStok: Number(item.stok) - item.qty });
        });

        setReceiptData({
          id: receiptId, date: now, items: [...cart], total: cartTotal, paid: paid, change: paid - cartTotal, 
          cashier: activeUser, customerName: customerName
        });

        await sendDataToSheet({ action: 'checkout', transactions: trxs, inventoryUpdates: invUpdates });
        
        setCart([]); setAmountPaid(''); setCustomerName(''); setCustomerPhone('');
        handlePrint('receipt');
      };

      const handlePrint = (mode) => { setPrintMode(mode); setTimeout(() => { window.print(); setPrintMode(null); }, 500); };
      const formatRupiah = (num) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num || 0);
      const formatDate = (iso) => iso ? new Intl.DateTimeFormat('id-ID', { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(iso)) : '-';

      const pantsSizes = Array.from({ length: 20 }, (_, i) => (i + 25).toString());
      const standardSizes = ['S', 'M', 'L', 'XL', 'XXL', 'All Size'];
      const allKategori = ['Kaos', 'Kemeja', 'Celana', 'Jaket', 'Aksesoris'];

      const filteredItems = useMemo(() => {
        let result = items.filter(item => (item.nama||'').toLowerCase().includes(searchTerm.toLowerCase()));
        if (invFilter.kategori !== 'Semua') result = result.filter(i => i.kategori === invFilter.kategori);
        if (invFilter.ukuran !== 'Semua') result = result.filter(i => i.ukuran === invFilter.ukuran);
        if (invFilter.sort === 'asc') result.sort((a, b) => (Number(a.hargaJual) || 0) - (Number(b.hargaJual) || 0));
        else if (invFilter.sort === 'desc') result.sort((a, b) => (Number(b.hargaJual) || 0) - (Number(a.hargaJual) || 0));
        return result;
      }, [items, searchTerm, invFilter]);

      // FILTER TRANSAKSI
      const filteredTransactions = useMemo(() => {
        let result = transactions;
        if (trxFilter.type !== 'Semua') result = result.filter(t => t.type === (trxFilter.type === 'Masuk' ? 'in' : 'out'));
        if (trxFilter.searchId) {
          result = result.filter(t => (t.id || '').toLowerCase().includes(trxFilter.searchId.toLowerCase()));
        }
        if (trxFilter.startDate) {
          const sDate = new Date(trxFilter.startDate);
          sDate.setHours(0,0,0,0);
          result = result.filter(t => new Date(t.date) >= sDate);
        }
        if (trxFilter.endDate) {
          const eDate = new Date(trxFilter.endDate);
          eDate.setHours(23,59,59,999);
          result = result.filter(t => new Date(t.date) <= eDate);
        }
        return result;
      }, [transactions, trxFilter]);

      const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
      const displayedTransactions = filteredTransactions.slice((currentPage - 1) * ITEMS_PER_PAGE, currentPage * ITEMS_PER_PAGE);

      const dashboardStats = useMemo(() => {
        const sales = transactions.filter(t => t.type === 'out');
        const totalOmzet = sales.reduce((acc, t) => acc + (Number(t.totalValue) || 0), 0);
        const totalProfit = sales.reduce((acc, t) => acc + (Number(t.profit) || 0), 0);
        const totalItemTerjual = sales.reduce((acc, t) => acc + Number(t.quantity), 0);

        const productSales = {};
        sales.forEach(t => {
          if (!productSales[t.itemId]) productSales[t.itemId] = { name: t.itemName, qty: 0, revenue: 0 };
          productSales[t.itemId].qty += Number(t.quantity);
          productSales[t.itemId].revenue += (Number(t.totalValue) || 0);
        });
        const topProducts = Object.values(productSales).sort((a, b) => b.qty - a.qty).slice(0, 5);

        const invStats = items.reduce((acc, item) => {
          acc.totalAset += ((Number(item.hargaJual) || 0) * Number(item.stok));
          if (Number(item.stok) < 5) acc.lowStock += 1;
          return acc;
        }, { totalAset: 0, lowStock: 0 });

        const dailyTrend = []; let maxDailyRev = 0;
        for (let i = 29; i >= 0; i--) {
          const d = new Date(); d.setDate(d.getDate() - i);
          const dateStr = d.toISOString().split('T')[0];
          const dayRev = sales.filter(t => t.date && t.date.startsWith(dateStr)).reduce((sum, t) => sum + (Number(t.totalValue) || 0), 0);
          if (dayRev > maxDailyRev) maxDailyRev = dayRev;
          dailyTrend.push({ date: d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }), rev: dayRev });
        }
        return { totalOmzet, totalProfit, totalItemTerjual, topProducts, invStats, dailyTrend, maxDailyRev };
      }, [items, transactions]);

      // ==========================================
      // SCREEN LOGIN
      // ==========================================
      if (initialLoading) return <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center gap-4"><Loader2 className="animate-spin text-orange-500" size={48} /><p className="font-medium text-slate-500 animate-pulse">Nyambungaken menyang Google Sheets...</p></div>;

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-slate-900 flex items-center justify-center p-4 font-sans relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-96 h-96 bg-orange-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-blue-600 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            
            <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md relative z-10">
              <div className="text-center mb-8">
                <div className="bg-orange-500 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-orange-500/30">
                  <Package size={32} className="text-white" />
                </div>
                <h1 className="text-2xl font-black text-slate-900">Orlando Garage Store</h1>
                <p className="text-sm text-slate-500 mt-1">Sistem Point of Sale & Inventori</p>
              </div>

              <form onSubmit={handleAppLogin} className="space-y-5">
                {loginError && <div className="bg-red-50 text-red-600 p-3 rounded-lg text-sm flex items-start gap-2 font-medium text-left leading-tight"><AlertCircle size={20} className="shrink-0" /> {loginError}</div>}
                <div className="space-y-1"><label className="text-sm font-bold text-slate-700">Username</label><div className="relative"><User size={18} className="absolute left-3 top-3.5 text-slate-400" /><input type="text" className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Lebetaken username" value={loginUsername} onChange={(e) => setLoginUsername(e.target.value)} required /></div></div>
                <div className="space-y-1"><label className="text-sm font-bold text-slate-700">Password</label><div className="relative"><Lock size={18} className="absolute left-3 top-3.5 text-slate-400" /><input type="password" className="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" placeholder="••••••••" value={loginPassword} onChange={(e) => setLoginPassword(e.target.value)} required /></div></div>
                <button type="submit" className="w-full py-3.5 bg-slate-900 text-white rounded-xl font-bold shadow-lg hover:bg-slate-800 transition-colors flex justify-center items-center gap-2 mt-4">Mlebet Aplikasi <ArrowUpCircle size={18} className="rotate-90" /></button>
              </form>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-12 relative flex flex-col">
          
          {toast && (
            <div className={`fixed top-4 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 print:hidden ${toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`}>
              <AlertCircle size={20} />
              <span className="font-medium text-sm">{toast.message}</span>
              <button onClick={() => setToast(null)} className="p-1 hover:bg-black/20 rounded-lg ml-2"><X size={16}/></button>
            </div>
          )}

          {isSaving && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center print:hidden">
              <div className="bg-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-4">
                <Loader2 className="animate-spin text-orange-500" size={28} />
                <span className="font-bold text-slate-800 text-lg">Nyimpen Data...</span>
              </div>
            </div>
          )}

          <div className="print:hidden">
            <nav className="bg-slate-900 text-white shadow-md sticky top-0 z-10">
              <div className="max-w-7xl mx-auto p-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center justify-between w-full md:w-auto">
                  <div className="flex items-center gap-3">
                    <div className="bg-orange-500 p-2 rounded-lg"><Package size={24} /></div>
                    <div>
                      <h1 className="text-xl font-bold tracking-tight leading-tight">Orlando Garage Store</h1>
                      <p className="text-xs text-slate-400">Kasir aktif: <span className="text-orange-400 font-bold capitalize">{activeUser}</span></p>
                    </div>
                  </div>
                  <button onClick={handleAppLogout} className="md:hidden p-2 text-slate-400 hover:text-red-400"><LogOut size={20} /></button>
                </div>
                
                <div className="flex items-center gap-4 w-full md:w-auto overflow-x-auto hide-scrollbar">
                  <div className="flex bg-slate-800 rounded-lg p-1 w-full md:w-auto">
                    <button onClick={() => setActiveTab('pos')} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors whitespace-nowrap flex-1 md:flex-none ${activeTab === 'pos' ? 'bg-orange-500 text-white shadow-sm' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}><ShoppingCart size={16} /> Kasir (POS)</button>
                    <button onClick={() => setActiveTab('inventory')} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors whitespace-nowrap flex-1 md:flex-none ${activeTab === 'inventory' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}><List size={16} /> Inventori</button>
                    <button onClick={() => { setActiveTab('transactions'); setCurrentPage(1); }} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors whitespace-nowrap flex-1 md:flex-none ${activeTab === 'transactions' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}><History size={16} /> Riwayat</button>
                    <button onClick={() => setActiveTab('dashboard')} className={`flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-colors whitespace-nowrap flex-1 md:flex-none ${activeTab === 'dashboard' ? 'bg-white text-slate-900 shadow-sm' : 'text-slate-300 hover:text-white hover:bg-slate-700'}`}><BarChart2 size={16} /> Analisis</button>
                  </div>
                  <button onClick={handleAppLogout} className="hidden md:flex items-center gap-2 px-3 py-2 text-sm text-slate-300 hover:text-red-400 transition-colors border border-transparent hover:border-red-400/30 rounded-lg bg-slate-800/50"><LogOut size={16} /> Medal</button>
                </div>
              </div>
            </nav>

            <main className="max-w-7xl mx-auto p-4 sm:p-6 space-y-6 mt-2 flex-1 w-full">
              
              {/* --- TAB KASIR (POS) --- */}
              {activeTab === 'pos' && (
                <div className="flex flex-col lg:flex-row gap-6 items-start">
                  <div className="flex-1 w-full flex flex-col gap-4">
                    <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-200 flex gap-3 items-center">
                      <div className="relative flex-1">
                        <Search size={18} className="absolute inset-y-0 left-3 top-3 text-slate-400" />
                        <input type="text" placeholder="Padosi kagem dipun tambah ing keranjang..." className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-orange-500 outline-none" value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                      </div>
                      <select className="bg-slate-50 border border-slate-200 text-sm rounded-lg px-4 py-2.5 outline-none hidden sm:block" value={invFilter.kategori} onChange={(e) => setInvFilter({...invFilter, kategori: e.target.value})}>
                        <option value="Semua">Sedaya Kategori</option>{allKategori.map(k => <option key={k} value={k}>{k}</option>)}
                      </select>
                    </div>

            {/* VIEW NOTA THERMAL KASIR */}
            {printMode === 'receipt' && receiptData && (
              <div className="font-mono text-[12px] leading-tight max-w-[80mm] mx-auto py-4 text-center">
                <h1 className="text-xl font-black mb-1">ORLANDO GARAGE</h1>
                <p className="mb-3">Sistem Manajemen Stok & POS</p>
                <p className="text-left border-t border-dashed border-black pt-2 mb-1">Nota : #{receiptData.id}</p>
                <p className="text-left mb-1 flex justify-between"><span>Wekdal: {formatDate(receiptData.date)}</span><span className="capitalize">Ksr: {receiptData.cashier}</span></p>
                {receiptData.customerName && <p className="text-left border-b border-dashed border-black pb-2 mb-2 font-bold uppercase">Pelanggan: {receiptData.customerName}</p>}
                {!receiptData.customerName && <div className="border-b border-dashed border-black pb-2 mb-2"></div>}
                
                <div className="text-left w-full space-y-2 mb-3">
                  {receiptData.items.map((item, idx) => {
                    const discMulti = 1 - (item.discount || 0) / 100;
                    const price = (Number(item.hargaJual) || 0) * discMulti;
                    const total = price * item.qty;
                    return (
                      <div key={idx} className="mb-1">
                        <p className="font-bold truncate">{item.nama} ({item.ukuran})</p>
                        {item.discount > 0 && <p className="text-[10px] text-slate-500">Diskon: {item.discount}%</p>}
                        <div className="flex justify-between">
                          <span>{item.qty} x {formatRupiah(price).replace('Rp', '')}</span>
                          <span>{formatRupiah(total).replace('Rp', '')}</span>
                        </div>
                      </div>
                    )
                  })}
                </div>
                <div className="border-t border-dashed border-black pt-2 space-y-1 text-right">
                  <div className="flex justify-between font-bold text-sm"><span>GUNGGUNG:</span><span>{formatRupiah(receiptData.total)}</span></div>
                  <div className="flex justify-between"><span>TUNAI:</span><span>{formatRupiah(receiptData.paid)}</span></div>
                  <div className="flex justify-between"><span>WANGSUL:</span><span>{formatRupiah(receiptData.change)}</span></div>
                </div>
                <div className="text-center mt-6 pt-3 border-t border-dashed border-black italic leading-snug">
                  "Matur nuwun sampun kersa blanja wonten mriki. Mugi panjenengan tansah pinaringan kasarasan, dipun-gampilaken sedaya urusanipun, lan dipun-lancarken rejekinipun."
                </div>
              </div>
            )}

            {/* VIEW LAPORAN STOK & TRANSAKSI */}
            {(printMode === 'stock' || printMode === 'sales') && (
              <div className="p-8">
                <div className="border-b-2 border-black pb-4 mb-6"><h1 className="text-3xl font-bold">Orlando Garage Store</h1><p className="text-gray-600">{printMode === 'stock' ? 'Laporan Posisi Stok' : 'Laporan Rekapitulasi Sadeyan'}</p></div>
                {printMode === 'stock' && (
                  <table className="w-full text-left text-sm border-collapse border border-gray-300">
                    <thead><tr className="bg-gray-100"><th className="border p-2">Barang</th><th className="border p-2 text-right">HPP</th><th className="border p-2 text-right">Rergi Sadeyan</th><th className="border p-2 text-center">Stok</th></tr></thead>
                    <tbody>
                      {filteredItems.map(item => (<tr key={item.id}><td className="border p-2">{item.nama} - {item.kategori} ({item.ukuran})</td><td className="border p-2 text-right">{formatRupiah(item.hargaModal)}</td><td className="border p-2 text-right">{formatRupiah(item.hargaJual)}</td><td className="border p-2 text-center font-bold">{item.stok}</td></tr>))}
                    </tbody>
                  </table>
                )}
                {printMode === 'sales' && (
                  <table className="w-full text-left text-sm border-collapse border border-gray-300">
                    <thead><tr className="bg-gray-100"><th className="border p-2">No. Nota</th><th className="border p-2">Tanggal</th><th className="border p-2">Kasir</th><th className="border p-2">Barang</th><th className="border p-2 text-center">Qty</th><th className="border p-2 text-right">Total</th><th className="border p-2 text-right">Bathèn</th></tr></thead>
                    <tbody>
                      {filteredTransactions.map(trx => (<tr key={trx.id}><td className="border p-2">#{trx.id}</td><td className="border p-2">{formatDate(trx.date)}</td><td className="border p-2 capitalize">{trx.cashier || '-'}</td><td className="border p-2">{trx.itemName}</td><td className="border p-2 text-center">{trx.quantity}</td><td className="border p-2 text-right">{trx.type === 'out' ? formatRupiah(trx.totalValue) : '-'}</td><td className="border p-2 text-right">{trx.type === 'out' ? formatRupiah(trx.profit) : '-'}</td></tr>))}
                    </tbody>
                  </table>
                )}
              </div>
            )}
          </div>

          {/* --- MODALS FORM TAMBAH/EDIT --- */}
          {isFormModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 print:hidden overflow-y-auto">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-xl my-8">
                <div className="flex justify-between items-center p-5 border-b bg-slate-50 sticky top-0 z-10"><h2 className="font-bold flex items-center gap-2"><Package className="text-orange-500" size={20}/> {formMode === 'add' ? 'Tambah Master Barang' : 'Edit Barang'}</h2><button onClick={() => setIsFormModalOpen(false)}><X/></button></div>
                
                <form onSubmit={handleSaveItem} className="p-5 space-y-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Nami Barang *</label>
                    <input type="text" required className="w-full p-2.5 border rounded focus:ring-2 focus:ring-orange-500 outline-none" value={formData.nama} onChange={(e) => setFormData({...formData, nama: e.target.value})} placeholder="Kemeja Flanel Vintage" />
                  </div>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Kategori *</label>
                      <select className="w-full p-2.5 border rounded focus:ring-2 outline-none bg-white" value={formData.kategori} onChange={(e) => setFormData({...formData, kategori: e.target.value, ukuran: e.target.value === 'Celana' ? '30' : 'L'})}>{allKategori.map(k => <option key={k} value={k}>{k}</option>)}</select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Ukuran *</label>
                      <select className="w-full p-2.5 border rounded focus:ring-2 outline-none bg-white" value={formData.ukuran} onChange={(e) => setFormData({...formData, ukuran: e.target.value})}>{formData.kategori === 'Celana' ? pantsSizes.map(s => <option key={s} value={s}>{s}</option>) : standardSizes.map(s => <option key={s} value={s}>{s}</option>)}</select>
                    </div>
                  </div>
                  
                  <div className="grid grid-cols-3 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Rergi Modal *</label>
                      <input type="number" required className="w-full p-2.5 border rounded focus:ring-2 outline-none" value={formData.hargaModal} onChange={(e) => setFormData({...formData, hargaModal: e.target.value})} placeholder="0" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Rergi Sadeyan *</label>
                      <input type="number" required className="w-full p-2.5 border rounded focus:ring-2 outline-none" value={formData.hargaJual} onChange={(e) => setFormData({...formData, hargaJual: e.target.value})} placeholder="0" />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Stok Wiwitan *</label>
                      <input type="number" required disabled={formMode === 'edit'} className="w-full p-2.5 border rounded bg-slate-50 disabled:opacity-50" value={formData.stok} onChange={(e) => setFormData({...formData, stok: e.target.value})} placeholder="0"/>
                    </div>
                  </div>

                  <div className="border-t border-slate-100 pt-4 grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-1">Katrangan / Deskripsi</label>
                      <textarea rows="4" className="w-full p-2.5 border rounded focus:ring-2 focus:ring-orange-500 outline-none text-sm" value={formData.deskripsi} onChange={(e) => setFormData({...formData, deskripsi: e.target.value})} placeholder="Lebetaken katrangan (opsional)..." />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-500 uppercase mb-1">URL Foto Gambar</label>
                      <input type="url" className="w-full p-2.5 border rounded focus:ring-2 focus:ring-orange-500 outline-none text-sm mb-2" value={formData.foto} onChange={(e) => setFormData({...formData, foto: e.target.value})} placeholder="https://contoh.com/gambar.jpg" />
                      <div className="bg-slate-50 p-3 rounded border border-slate-100 text-xs text-slate-500">
                        Priksani url gambar ingkang dipun lebetaken pungkasanipun wujud tipe gambar (kados .jpg / .png).<br/><br/><i>Kosongaken kemawon manawi boten wonten foto.</i>
                      </div>
                    </div>
                  </div>

                  <div className="pt-2 flex gap-3"><button type="button" onClick={() => setIsFormModalOpen(false)} className="flex-1 p-3 border rounded font-bold text-slate-600 hover:bg-slate-50">Batal</button><button type="submit" disabled={isSaving} className="flex-1 p-3 bg-slate-900 text-white font-bold rounded flex justify-center items-center gap-2 hover:bg-slate-800 shadow-sm">{isSaving ? <Loader2 className="animate-spin" size={18}/> : 'Simpen Barang'}</button></div>
                </form>
              </div>
            </div>
          )}

          {/* MODAL TRANSAKSI MASUK (MANUAL) */}
          {isTrxModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 print:hidden">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden">
                <div className="p-4 bg-green-600 text-white flex justify-between"><h2 className="font-bold flex items-center gap-2"><ArrowDownCircle size={20}/> Barang Lebet</h2><button onClick={() => setIsTrxModalOpen(false)}><X/></button></div>
                <form onSubmit={handleSaveTransaction} className="p-5 space-y-4">
                  <div className="font-bold bg-slate-50 p-2 border rounded">{trxData.nama}</div>
                  <input type="number" min="1" required className="w-full p-2 border rounded focus:ring-2 outline-none" value={trxData.qty} onChange={(e) => setTrxData({...trxData, qty: e.target.value})} placeholder="Gunggung Barang Lebet" />
                  <button type="submit" disabled={isSaving} className="w-full p-2.5 bg-green-600 text-white rounded font-bold flex justify-center items-center gap-2">{isSaving ? <Loader2 className="animate-spin" size={16}/> : 'Konfirmasi Lebet'}</button>
                </form>
              </div>
            </div>
          )}

          {/* MODAL HAPUS BARANG */}
          {itemToDelete && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 print:hidden">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden p-6 text-center">
                <div className="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4"><AlertCircle size={32} /></div>
                <h3 className="text-lg font-bold text-slate-800 mb-2">Busek Item?</h3>
                <p className="text-slate-500 text-sm mb-6">Yektos badhe mbusek <strong>{itemToDelete.nama}</strong>?</p>
                <div className="flex gap-3">
                  <button onClick={() => setItemToDelete(null)} className="flex-1 py-2 bg-slate-100 text-slate-700 font-medium rounded-lg">Batal</button>
                  <button onClick={handleDeleteItem} disabled={isSaving} className="flex-1 py-2 bg-red-600 text-white font-medium rounded-lg flex justify-center items-center">{isSaving ? <Loader2 className="animate-spin" size={16}/> : 'Busek'}</button>
                </div>
              </div>
            </div>
          )}

          {/* MODAL DETAIL BARANG (BACA DESKRIPSI & FOTO BESAR) */}
          {detailItem && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm print:hidden" onClick={() => setDetailItem(null)}>
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden" onClick={e => e.stopPropagation()}>
                <div className="relative h-64 bg-slate-100 flex items-center justify-center border-b">
                  {detailItem.foto ? (
                    <img src={detailItem.foto} alt={detailItem.nama} className="w-full h-full object-cover" />
                  ) : (
                    <ImageIcon size={64} className="text-slate-300" />
                  )}
                  <button onClick={() => setDetailItem(null)} className="absolute top-4 right-4 bg-black/50 hover:bg-black/70 text-white p-1.5 rounded-full backdrop-blur-md transition-colors"><X size={20}/></button>
                </div>
                <div className="p-6">
                  <div className="flex justify-between items-start mb-2">
                    <h2 className="text-xl font-bold text-slate-900 leading-tight pr-4">{detailItem.nama}</h2>
                    <span className="bg-slate-100 px-2 py-1 text-xs font-bold rounded text-slate-600 whitespace-nowrap">{detailItem.kategori}</span>
                  </div>
                  <p className="text-sm font-medium text-slate-500 mb-4">Ukuran: {detailItem.ukuran}</p>
                  
                  <div className="grid grid-cols-2 gap-4 mb-4 bg-slate-50 p-3 rounded-lg border border-slate-100">
                    <div>
                      <p className="text-[10px] font-bold text-slate-400 uppercase">Rergi Sadeyan</p>
                      <p className="font-bold text-slate-800">{formatRupiah(detailItem.hargaJual)}</p>
                    </div>
                    <div>
                      <p className="text-[10px] font-bold text-slate-400 uppercase">Tirah Stok</p>
                      <p className={`font-bold ${Number(detailItem.stok) > 0 ? 'text-green-600' : 'text-red-500'}`}>{detailItem.stok} Pcs</p>
                    </div>
                  </div>

                  <div>
                    <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">Katrangan / Deskripsi Barang</p>
                    <div className="text-sm text-slate-600 bg-white border border-slate-200 p-3 rounded-lg min-h-[80px] whitespace-pre-wrap">
                      {detailItem.deskripsi ? detailItem.deskripsi : <span className="italic text-slate-400">Boten wonten katrangan ingkang dipun lebetaken.</span>}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
